# Cogento nginx: default server (cogento.edgible.com) + *.cogento.edgible.com tenant subdomains
#
# Subdomain block: simple 2-way proxy. User visits kgtc.../x → 302 to kgtc.../tenant/<id>/x;
# app only sees path-based URLs (/tenant/:id/...). One route tree, no cookie/by-host in frontend.

# Strip trailing dot from host (DNS/proxy quirk: e.g. kgtc.cogento.edgible.com. → kgtc.cogento.edgible.com)
map $host $host_clean {
    "~^(.*)\.$" $1;
    default $host;
}
# Subdomain = tenant_id for *.cogento.edgible.com (no overrides; clean URLs)
map $host_clean $tenant_slug {
    default "";
    "~^(.+)\.cogento\.edgible\.com$" $1;
}
map $host_clean $tenant_id {
    default $tenant_slug;
}

upstream cogento_ui {
    server ui:80;
}
upstream cogento_api {
    server api:8000;
}

# Default server (cogento.edgible.com) – no path rewrite
server {
    listen 80 default_server;
    server_name _;

    location /postgres/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /stripe/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /api/ {
        proxy_pass http://cogento_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location = /health {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
    }
    location ~ ^/[^/]+/auth/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location ~ ^/[^/]+/images/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }

    location / {
        proxy_pass http://cogento_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# *.cogento.edgible.com – path-based URLs only (simple 2-way proxy)
# User visits kgtc.cogento.edgible.com/x → 302 to kgtc.../tenant/<tenant_id>/x → app sees /tenant/<id>/x (one route tree, no cookie/by-host)
server {
    listen 80;
    server_name ~^(.+)\.cogento\.edgible\.com\.?$;

    if ($host != $host_clean) {
        return 301 $scheme://$host_clean$request_uri;
    }

    location /postgres/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /stripe/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /api/ {
        proxy_pass http://cogento_api/;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location = /health {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
    }
    location ~ ^/[^/]+/auth/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location ~ ^/[^/]+/images/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }

    # Clean paths: proxy to UI (app sees /jobs, /users, etc.; tenant from host)
    location / {
        proxy_pass http://cogento_ui;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# www.cogento.org → redirect to apex (so /demo etc. resolve correctly)
server {
    listen 80;
    server_name www.cogento.org;
    return 301 https://cogento.org$request_uri;
}

# *.cogento.org – same as *.cogento.edgible.com (tenant subdomain = path tenant)
server {
    listen 80;
    server_name ~^(.+)\.cogento\.org\.?$;

    if ($host != $host_clean) {
        return 301 $scheme://$host_clean$request_uri;
