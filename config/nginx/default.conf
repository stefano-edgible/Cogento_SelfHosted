# Cogento nginx: default server + tenant subdomains (self-hosted)
# Paths and API proxy; subdomain blocks work when DNS points to this host.

map $host $host_clean {
    "~^(.*)\.$" $1;
    default $host;
}
map $host_clean $tenant_slug {
    default "";
    "~^(.+)\.cogento\.edgible\.com$" $1;
}
map $host_clean $tenant_id {
    default $tenant_slug;
}

upstream cogento_ui {
    server ui:80;
}
upstream cogento_api {
    server api:8000;
}

server {
    listen 80 default_server;
    server_name _;

    location /postgres/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /stripe/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /api/ {
        proxy_pass http://cogento_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location = /health {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
    }
    location ~ ^/[^/]+/auth/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location ~ ^/[^/]+/images/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }

    location / {
        proxy_pass http://cogento_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name ~^(.+)\.cogento\.edgible\.com\.?$;

    if ($host != $host_clean) {
        return 301 $scheme://$host_clean$request_uri;
    }

    location /postgres/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /stripe/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location /api/ {
        proxy_pass http://cogento_api/;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location = /health {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
    }
    location ~ ^/[^/]+/auth/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }
    location ~ ^/[^/]+/images/ {
        proxy_pass http://cogento_api;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Email $http_x_user_email;
    }

    location / {
        proxy_pass http://cogento_ui;
        proxy_set_header Host $host_clean;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
